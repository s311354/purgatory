name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-info:
    name: PR Information
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: PR Stats
      run: |
        echo "## Pull Request Statistics" > pr-stats.md
        echo "" >> pr-stats.md
        echo "- **Changed files:** $(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)" >> pr-stats.md
        echo "- **Insertions:** $(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -oP '\d+(?= insertion)')" >> pr-stats.md
        echo "- **Deletions:** $(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -oP '\d+(?= deletion)')" >> pr-stats.md
        echo "" >> pr-stats.md
        echo "### Changed Files:" >> pr-stats.md
        git diff --name-status origin/${{ github.base_ref }}...HEAD | while read status file; do
          echo "- [$status] \`$file\`" >> pr-stats.md
        done
        
        cat pr-stats.md
    
    - name: Check for breaking changes
      run: |
        # Check if any breaking changes in public API
        if git diff origin/${{ github.base_ref }}...HEAD -- src/purgatory.h | grep -q "^-.*public\|^-.*class"; then
          echo "⚠️ Warning: Potential breaking changes detected in purgatory.h"
          echo "breaking_changes=true" >> $GITHUB_ENV
        else
          echo "breaking_changes=false" >> $GITHUB_ENV
        fi
    
    - name: Comment PR stats
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const stats = fs.readFileSync('pr-stats.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: stats
          });
      continue-on-error: true

  size-check:
    name: Binary Size Check
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout PR branch
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-11
    
    - name: Build PR version
      run: |
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-11 \
          -B build
        cmake --build build -j$(nproc)
        PR_SIZE=$(stat -c%s build/purgatory)
        echo "PR_SIZE=$PR_SIZE" >> $GITHUB_ENV
    
    - name: Checkout base branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.base_ref }}
        clean: true
    
    - name: Build base version
      run: |
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-11 \
          -B build-base
        cmake --build build-base -j$(nproc)
        BASE_SIZE=$(stat -c%s build-base/purgatory)
        echo "BASE_SIZE=$BASE_SIZE" >> $GITHUB_ENV
    
    - name: Compare sizes
      run: |
        PR_SIZE=${{ env.PR_SIZE }}
        BASE_SIZE=${{ env.BASE_SIZE }}
        DIFF=$((PR_SIZE - BASE_SIZE))
        PERCENT=$(awk "BEGIN {printf \"%.2f\", ($DIFF / $BASE_SIZE) * 100}")
        
        echo "## Binary Size Comparison" > size-report.md
        echo "" >> size-report.md
        echo "- **Base branch:** $(numfmt --to=iec-i --suffix=B $BASE_SIZE)" >> size-report.md
        echo "- **PR branch:** $(numfmt --to=iec-i --suffix=B $PR_SIZE)" >> size-report.md
        echo "- **Difference:** $(numfmt --to=iec-i --suffix=B $DIFF) ($PERCENT%)" >> size-report.md
        
        if [ $DIFF -gt 1048576 ]; then
          echo "" >> size-report.md
          echo "⚠️ **Warning:** Binary size increased by more than 1MB" >> size-report.md
        fi
        
        cat size-report.md
    
    - name: Comment size comparison
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('size-report.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });
      continue-on-error: true

  test-algorithms:
    name: Algorithm Test Coverage
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-11
    
    - name: Build and test
      run: |
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=g++-11 \
          -DBUILD_TESTING=ON \
          -B build
        cmake --build build -j$(nproc)
        cd build
        ctest --output-on-failure --verbose 2>&1 | tee test-output.txt
    
    - name: Analyze test results
      run: |
        cd build
        
        echo "## Test Results" > test-report.md
        echo "" >> test-report.md
        
        # Count tests
        TOTAL=$(grep -c "Test #" test-output.txt || echo "0")
        PASSED=$(grep -c "Passed" test-output.txt || echo "0")
        FAILED=$(grep -c "Failed" test-output.txt || echo "0")
        
        echo "- **Total tests:** $TOTAL" >> test-report.md
        echo "- **Passed:** ✅ $PASSED" >> test-report.md
        echo "- **Failed:** ❌ $FAILED" >> test-report.md
        
        if [ $FAILED -gt 0 ]; then
          echo "" >> test-report.md
          echo "### Failed Tests:" >> test-report.md
          grep -A 5 "Failed" test-output.txt >> test-report.md || true
        fi
        
        cat test-report.md
    
    - name: Upload test output
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/test-output.txt
        retention-days: 7
