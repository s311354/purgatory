name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-11
    
    - name: Build release binary
      run: |
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-11 \
          -DBUILD_TESTING=OFF \
          -B build
        cmake --build build -j$(nproc)
    
    - name: Test binary
      run: ./build/purgatory src/test.txt
    
    - name: Package release
      run: |
        mkdir -p release
        cp build/purgatory release/
        cp README.md release/
        cp LICENSE release/
        cp -r docs release/
        
        cd release
        tar -czf ../purgatory-linux-x86_64.tar.gz *
        cd ..
        
        # Create checksum
        sha256sum purgatory-linux-x86_64.tar.gz > purgatory-linux-x86_64.tar.gz.sha256
    
    - name: Generate changelog
      id: changelog
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG="${{ inputs.tag }}"
        else
          TAG="${GITHUB_REF#refs/tags/}"
        fi
        
        echo "## Changes in $TAG" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        
        # Get commits since last tag
        PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
        
        if [ -n "$PREV_TAG" ]; then
          echo "Changes since $PREV_TAG:" >> CHANGELOG.md
          git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> CHANGELOG.md
        else
          echo "Initial release" >> CHANGELOG.md
        fi
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat CHANGELOG.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        body: ${{ steps.changelog.outputs.changelog }}
        files: |
          purgatory-linux-x86_64.tar.gz
          purgatory-linux-x86_64.tar.gz.sha256
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}