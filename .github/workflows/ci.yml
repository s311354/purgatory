name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-11
    
    - name: Configure CMake
      run: |
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-11 \
          -DBUILD_TESTING=ON \
          -B build
    
    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run unit tests
      run: ctest --test-dir build --output-on-failure -j$(nproc)
    
    - name: Test executable
      run: ./build/purgatory src/test.txt
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: purgatory-binary
        path: build/purgatory
        retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format-14 cppcheck
    
    - name: Run cppcheck
      run: |
        cppcheck \
          --enable=all \
          --error-exitcode=0 \
          --inline-suppr \
          --suppress=missingIncludeSystem \
          src/*.cc src/*.h 2>&1 | tee cppcheck-report.txt
        echo "Cppcheck completed (non-blocking)"
    
    - name: Check code formatting
      run: |
        git ls-files -z -- \
          '*.c' '*.cc' '*.cpp' '*.cxx' \
          '*.h' '*.hh' '*.hpp' '*.hxx' |
          xargs -0 clang-format-14 --style=file --dry-run --Werror

  documentation:
    name: Documentation Check
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check documentation files
      run: |
        echo "Checking documentation files..."
        test -f README.md
        test -f LICENSE
        test -f docs/ALGORITHMS.md
        test -f tmux-session.sh
        echo "✓ All documentation files present"
    
    - name: Validate markdown links
      uses: lycheeverse/lychee-action@v2
      with:
        args: '--verbose --no-progress --exclude-mail *.md docs/**/*.md'
        fail: false
      continue-on-error: true
