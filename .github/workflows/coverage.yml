name: Code Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  coverage:
    name: Basic Coverage Analysis
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-11 gcovr
    
    - name: Build with coverage
      run: |
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=g++-11 \
          -DCMAKE_CXX_FLAGS="--coverage" \
          -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
          -DBUILD_TESTING=OFF \
          -B build
        cmake --build build -j$(nproc)
    
    - name: Run executable for coverage
      run: |
        ./build/purgatory src/test.txt
    
    - name: Generate coverage report
      run: |
        gcovr --root . \
          --filter src/ \
          --exclude 'src/main.cc' \
          --exclude 'src/entry.cc' \
          --html-details coverage.html \
          --print-summary \
          --fail-under-line 0 || true
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage*.html
        retention-days: 30
      continue-on-error: true
    
    - name: Coverage summary
      run: |
        echo "## Coverage Report" >> coverage-summary.txt
        gcovr --root . \
          --filter src/ \
          --exclude 'src/main.cc' \
          --exclude 'src/entry.cc' \
          --print-summary >> coverage-summary.txt 2>/dev/null || echo "Coverage analysis completed" >> coverage-summary.txt
        
        cat coverage-summary.txt